{% extends 'finance_app/base.html' %}
{% block title %}Forgot Password | Finance Tracker{% endblock %}
{% block content %}
<section class="auth-shell auth-shell--narrow">
    <div class="auth-panel auth-panel--form">
        <div class="panel-heading">
            <div>
                <p class="eyebrow">Password Recovery</p>
                <h1>Forgot your password?</h1>
                <p class="hero-copy">Enter your account email and we will send you a reset link.</p>
            </div>
        </div>
        <form method="post" class="form-card auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Reset Link</button>
        </form>
        <div class="auth-links">
            <a href="{% url 'finance_app:login' %}">Back to login</a>
        </div>
    </div>
</section>
{% endblock %}
